<!DOCTYPE html>
<html>
<head>
    <meta charset='UTF-8'>
    <title>QDC 3D</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: #1a1a2e; height: 100vh; overflow: hidden; }
        .container { display: flex; height: 100vh; }
        .sidebar { width: 400px; background: white; padding: 20px; overflow-y: auto; }
        .sidebar h1 { color: #333; margin-bottom: 20px; }
        .control { margin-bottom: 20px; }
        .control label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; }
        .control select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .viewport { flex: 1; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); position: relative; }
        #canvas { width: 100%; height: 100%; display: block; }
        .specs { background: #f5f5f5; padding: 15px; margin-top: 20px; border-radius: 4px; }
        .specs h3 { margin-bottom: 10px; color: #333; }
        .spec-item { padding: 5px 0; font-size: 12px; color: #666; border-bottom: 1px solid #ddd; }
        .hint { font-size: 11px; color: #999; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>QDC Interativo</h1>
            
            <div class="control">
                <label>Tipo de Produto:</label>
                <select id="tipo">
                    <option value="">Selecione...</option>
                    <option value="disjuntor">Disjuntor</option>
                    <option value="quadro">Quadro de Distribuição</option>
                </select>
            </div>
            
            <div class="control">
                <label>Marca:</label>
                <select id="marca">
                    <option value="">Selecione uma marca...</option>
                </select>
            </div>
            
            <div class="control">
                <label>Modelo:</label>
                <select id="modelo">
                    <option value="">Selecione um modelo...</option>
                </select>
            </div>
            
            <div class="specs">
                <h3>Especificações</h3>
                <div id="specs-list"></div>
            </div>

            <div class="hint">
                🔄 <strong>Controles:</strong><br>
                ☀️ Arraste = Rotacionar<br>
                🔍 Scroll = Zoom<br>
                ⤴️ Botão Reset
            </div>
            
            <button onclick="resetView()" style="width: 100%; padding: 10px; margin-top: 10px; background: #2a5298; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">🔄 Reset</button>
        </div>
        
        <div class="viewport">
            <canvas id="canvas"></canvas>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const PRODUTOS = {
            disjuntores: {
                "Schneider Electric": [
                    {id: "sch_10a", modelo: "Acti9 C60N 10A 1P", specs: {"Corrente": "10A", "Polos": "1P", "Tensão": "230V", "Curva": "C"}, color: 0x2d5a2d},
                    {id: "sch_20a", modelo: "Acti9 C60N 20A 1P", specs: {"Corrente": "20A", "Polos": "1P", "Tensão": "230V", "Curva": "C"}, color: 0x2d5a2d},
                    {id: "sch_32a", modelo: "Acti9 C60N 32A 2P", specs: {"Corrente": "32A", "Polos": "2P", "Tensão": "230/400V", "Curva": "C"}, color: 0x2d5a2d}
                ],
                "Siemens": [
                    {id: "sie_10a", modelo: "5SY5 10A 1P", specs: {"Corrente": "10A", "Polos": "1P", "Tensão": "230V", "Curva": "C"}, color: 0x1e3a5f},
                    {id: "sie_20a", modelo: "5SY5 20A 1P", specs: {"Corrente": "20A", "Polos": "1P", "Tensão": "230V", "Curva": "C"}, color: 0x1e3a5f}
                ],
                "ABB": [
                    {id: "abb_10a", modelo: "S200 10A 1P", specs: {"Corrente": "10A", "Polos": "1P", "Tensão": "230V", "Curva": "C"}, color: 0xff6b1a},
                    {id: "abb_20a", modelo: "S200 20A 1P", specs: {"Corrente": "20A", "Polos": "1P", "Tensão": "230V", "Curva": "C"}, color: 0xff6b1a}
                ]
            },
            quadros: {
                "Schneider Electric": [
                    {id: "sch_q4", modelo: "Pragma 4 módulos", specs: {"Módulos": "4", "Tipo": "Embutir", "Proteção": "IP30", "Dimensão": "300x350x150"}, color: 0x2d5a2d, modules: 4},
                    {id: "sch_q12", modelo: "Pragma 12 módulos", specs: {"Módulos": "12", "Tipo": "Embutir", "Proteção": "IP30", "Dimensão": "500x700x150"}, color: 0x2d5a2d, modules: 12}
                ],
                "Steck": [
                    {id: "stk_q8", modelo: "SCE 8 módulos", specs: {"Módulos": "8", "Tipo": "Embutir", "Proteção": "IP30", "Dimensão": "400x450x150"}, color: 0xccaa00, modules: 8},
                    {id: "stk_q16", modelo: "SCE 16 módulos", specs: {"Módulos": "16", "Tipo": "Embutir", "Proteção": "IP40", "Dimensão": "600x850x150"}, color: 0xccaa00, modules: 16}
                ]
            }
        };
        
        let scene, camera, renderer;
        let currentMesh = null;
        let controls = { isDragging: false, prevX: 0, prevY: 0 };
        
        function init3D() {
            const canvas = document.getElementById('canvas');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            scene.fog = new THREE.Fog(0x1a1a2e, 1000, 100);
            
            camera = new THREE.PerspectiveCamera(75, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
            camera.position.set(0, 0, 150);
            
            renderer = new THREE.WebGLRenderer({canvas: canvas, antialias: true});
            renderer.setSize(canvas.clientWidth, canvas.clientHeight);
            renderer.shadowMap.enabled = true;
            
            // Lighting
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(200, 200, 200);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            scene.add(dirLight);
            
            const ambient = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambient);
            
            animate();
        }
        
        function createDisjuntor(produto) {
            const group = new THREE.Group();
            
            // Corpo do disjuntor
            const bodyGeometry = new THREE.BoxGeometry(15, 70, 75);
            const bodyMaterial = new THREE.MeshStandardMaterial({
                color: produto.color || 0x2a5298,
                metalness: 0.4,
                roughness: 0.6
            });
            const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
            body.castShadow = true;
            group.add(body);
            
            // Alça (alavanca)
            const handleGeometry = new THREE.BoxGeometry(6, 15, 8);
            const handleMaterial = new THREE.MeshStandardMaterial({
                color: 0x1a1a1a,
                metalness: 0.2,
                roughness: 0.8
            });
            const handle = new THREE.Mesh(handleGeometry, handleMaterial);
            handle.position.set(0, 32, 0);
            handle.castShadow = true;
            group.add(handle);
            
            // Terminais (superior e inferior)
            const terminalGeometry = new THREE.CylinderGeometry(2, 2, 5, 8);
            const terminalMaterial = new THREE.MeshStandardMaterial({
                color: 0xccaa00,
                metalness: 0.9,
                roughness: 0.1
            });
            
            const terminalTop = new THREE.Mesh(terminalGeometry, terminalMaterial);
            terminalTop.position.set(0, 37, 0);
            terminalTop.castShadow = true;
            group.add(terminalTop);
            
            const terminalBottom = new THREE.Mesh(terminalGeometry, terminalMaterial);
            terminalBottom.position.set(0, -37, 0);
            terminalBottom.castShadow = true;
            group.add(terminalBottom);
            
            return group;
        }
        
        function createQuadro(produto) {
            const group = new THREE.Group();
            const modules = produto.modules || 4;
            
            // Carcaça do quadro
            const width = 80 + (modules * 8);
            const height = 140;
            const depth = 40;
            
            const caseGeometry = new THREE.BoxGeometry(width, height, depth);
            const caseMaterial = new THREE.MeshStandardMaterial({
                color: produto.color || 0x3a3a3a,
                metalness: 0.3,
                roughness: 0.7
            });
            const caseBox = new THREE.Mesh(caseGeometry, caseMaterial);
            caseBox.castShadow = true;
            group.add(caseBox);
            
            // Slots para módulos
            const slotMaterial = new THREE.MeshStandardMaterial({
                color: 0x1a1a1a,
                metalness: 0.1,
                roughness: 0.9
            });
            
            const slotWidth = (width - 20) / modules;
            for (let i = 0; i < modules; i++) {
                const slotGeometry = new THREE.BoxGeometry(slotWidth - 2, height - 20, 3);
                const slot = new THREE.Mesh(slotGeometry, slotMaterial);
                slot.position.set(-width/2 + 15 + i * slotWidth + slotWidth/2, 0, depth/2 + 2);
                slot.castShadow = true;
                group.add(slot);
            }
            
            // Chave de segurança frontal
            const keyGeometry = new THREE.BoxGeometry(15, 25, 5);
            const keyMaterial = new THREE.MeshStandardMaterial({
                color: 0xff0000,
                metalness: 0.5,
                roughness: 0.5
            });
            const key = new THREE.Mesh(keyGeometry, keyMaterial);
            key.position.set(-width/2 + 25, -height/2 + 20, depth/2 + 5);
            key.castShadow = true;
            group.add(key);
            
            return group;
        }
        
        function createProduct(produto) {
            if (currentMesh) scene.remove(currentMesh);
            
            const tipo = document.getElementById('tipo').value;
            currentMesh = tipo === 'disjuntor' ? createDisjuntor(produto) : createQuadro(produto);
            
            scene.add(currentMesh);
        }
        
        function resetView() {
            if (currentMesh) {
                currentMesh.rotation.set(0.3, 0.5, 0);
            }
        }
        
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        
        // Event listeners
        document.getElementById('tipo').addEventListener('change', function() {
            const tipo = this.value;
            const marcaSelect = document.getElementById('marca');
            marcaSelect.innerHTML = '<option value="">Selecione uma marca...</option>';
            
            if (!tipo) return;
            
            const tipoKey = tipo === 'disjuntor' ? 'disjuntores' : 'quadros';
            Object.keys(PRODUTOS[tipoKey]).forEach(marca => {
                const opt = document.createElement('option');
                opt.value = marca;
                opt.textContent = marca;
                marcaSelect.appendChild(opt);
            });
        });
        
        document.getElementById('marca').addEventListener('change', function() {
            const tipo = document.getElementById('tipo').value;
            const marca = this.value;
            const modeloSelect = document.getElementById('modelo');
            modeloSelect.innerHTML = '<option value="">Selecione um modelo...</option>';
            
            if (!tipo || !marca) return;
            
            const tipoKey = tipo === 'disjuntor' ? 'disjuntores' : 'quadros';
            PRODUTOS[tipoKey][marca].forEach(prod => {
                const opt = document.createElement('option');
                opt.value = prod.id;
                opt.textContent = prod.modelo;
                modeloSelect.appendChild(opt);
            });
        });
        
        document.getElementById('modelo').addEventListener('change', function() {
            const tipo = document.getElementById('tipo').value;
            const marca = document.getElementById('marca').value;
            const modeloId = this.value;
            
            if (!tipo || !marca || !modeloId) return;
            
            const tipoKey = tipo === 'disjuntor' ? 'disjuntores' : 'quadros';
            const produto = PRODUTOS[tipoKey][marca].find(p => p.id === modeloId);
            
            if (produto) {
                createProduct(produto);
                resetView();
                
                // Show specs
                const specsList = document.getElementById('specs-list');
                specsList.innerHTML = '';
                Object.entries(produto.specs).forEach(([key, value]) => {
                    const div = document.createElement('div');
                    div.className = 'spec-item';
                    div.innerHTML = `<strong>${key}:</strong> ${value}`;
                    specsList.appendChild(div);
                });
            }
        });
        
        // Mouse controls
        document.getElementById('canvas').addEventListener('mousedown', (e) => {
            controls.isDragging = true;
            controls.prevX = e.clientX;
            controls.prevY = e.clientY;
        });
        
        document.getElementById('canvas').addEventListener('mousemove', (e) => {
            if (!controls.isDragging || !currentMesh) return;
            const deltaX = e.clientX - controls.prevX;
            const deltaY = e.clientY - controls.prevY;
            currentMesh.rotation.y += deltaX * 0.01;
            currentMesh.rotation.x += deltaY * 0.01;
            controls.prevX = e.clientX;
            controls.prevY = e.clientY;
        });
        
        document.getElementById('canvas').addEventListener('mouseup', () => {
            controls.isDragging = false;
        });
        
        document.getElementById('canvas').addEventListener('wheel', (e) => {
            e.preventDefault();
            if (!currentMesh) return;
            camera.position.z += e.deltaY > 0 ? 10 : -10;
            camera.position.z = Math.max(50, Math.min(500, camera.position.z));
        });
        
        init3D();
    </script>
</body>
</html>
