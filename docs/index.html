<!DOCTYPE html>
<html>
<head>
    <meta charset='UTF-8'>
    <meta http-equiv='cache-control' content='no-cache, no-store, must-revalidate'>
    <meta http-equiv='pragma' content='no-cache'>
    <meta http-equiv='expires' content='0'>
    <title>QDC 3D v3</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: #1a1a2e; height: 100vh; overflow: hidden; }
        .container { display: flex; height: 100vh; }
        .sidebar { width: 350px; background: white; padding: 20px; overflow-y: auto; }
        .sidebar h1 { color: #333; margin-bottom: 15px; font-size: 18px; }
        .control { margin-bottom: 15px; }
        .control label { display: block; font-weight: bold; margin-bottom: 3px; color: #333; font-size: 12px; }
        .control select { width: 100%; padding: 6px; border: 1px solid #ccc; font-size: 12px; }
        .viewport { flex: 1; background: #1a1a2e; position: relative; }
        #canvas { width: 100%; height: 100%; display: block; }
        .specs { background: #f5f5f5; padding: 10px; margin-top: 15px; border-radius: 4px; font-size: 11px; }
        .specs h3 { margin-bottom: 8px; font-size: 13px; }
        .spec-item { padding: 3px 0; border-bottom: 1px solid #ddd; }
        button { width: 100%; padding: 8px; background: #2a5298; color: white; border: none; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>QDC Interativo</h1>
            
            <div class="control">
                <label>Tipo:</label>
                <select id="tipo">
                    <option value="">Selecione...</option>
                    <option value="disjuntor">Disjuntor</option>
                    <option value="quadro">Quadro</option>
                </select>
            </div>
            
            <div class="control">
                <label>Marca:</label>
                <select id="marca">
                    <option value="">Selecione...</option>
                </select>
            </div>
            
            <div class="control">
                <label>Modelo:</label>
                <select id="modelo">
                    <option value="">Selecione...</option>
                </select>
            </div>
            
            <div class="specs">
                <h3>Specs</h3>
                <div id="specs-list"></div>
            </div>
            
            <button onclick="resetView()">Reset</button>
        </div>
        
        <div class="viewport">
            <canvas id="canvas"></canvas>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
    try {
        const DATA = {
            disjuntores: {
                "Schneider": [{id:1, name:"10A 1P", specs:{Corrente:"10A"}}, {id:2, name:"20A 1P", specs:{Corrente:"20A"}}],
                "Siemens": [{id:3, name:"10A 1P", specs:{Corrente:"10A"}}],
                "ABB": [{id:4, name:"20A 1P", specs:{Corrente:"20A"}}]
            },
            quadros: {
                "Schneider": [{id:5, name:"4 modulos", specs:{Modulos:"4"}}, {id:6, name:"12 modulos", specs:{Modulos:"12"}}],
                "Steck": [{id:7, name:"8 modulos", specs:{Modulos:"8"}}]
            }
        };
        
        let scene, camera, renderer, mesh;
        
        function initThree() {
            const canvas = document.getElementById('canvas');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            
            camera = new THREE.PerspectiveCamera(75, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
            camera.position.z = 100;
            
            renderer = new THREE.WebGLRenderer({canvas, antialias: true, alpha: true});
            renderer.setSize(canvas.clientWidth, canvas.clientHeight);
            
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(100, 100, 100);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            
            animate();
        }
        
        function createObject(type) {
            if (mesh) scene.remove(mesh);
            
            let geom, color;
            if (type === 'disjuntor') {
                geom = new THREE.BoxGeometry(20, 80, 10);
                color = 0x2a5298;
            } else {
                geom = new THREE.BoxGeometry(200, 150, 50);
                color = 0x3a3a3a;
            }
            
            const mat = new THREE.MeshStandardMaterial({color, metalness: 0.4, roughness: 0.6});
            mesh = new THREE.Mesh(geom, mat);
            scene.add(mesh);
        }
        
        function resetView() {
            if (mesh) mesh.rotation.set(0.3, 0.5, 0);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        
        document.getElementById('tipo').addEventListener('change', function() {
            const tipo = this.value;
            const marcaSelect = document.getElementById('marca');
            marcaSelect.innerHTML = '<option value="">Selecione...</option>';
            
            if (!tipo) return;
            const key = tipo === 'disjuntor' ? 'disjuntores' : 'quadros';
            Object.keys(DATA[key]).forEach(m => {
                const opt = document.createElement('option');
                opt.value = m;
                opt.textContent = m;
                marcaSelect.appendChild(opt);
            });
            createObject(tipo);
        });
        
        document.getElementById('marca').addEventListener('change', function() {
            const tipo = document.getElementById('tipo').value;
            const marca = this.value;
            const modeloSelect = document.getElementById('modelo');
            modeloSelect.innerHTML = '<option value="">Selecione...</option>';
            
            if (!tipo || !marca) return;
            const key = tipo === 'disjuntor' ? 'disjuntores' : 'quadros';
            DATA[key][marca].forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.id;
                opt.textContent = p.name;
                opt.dataset.specs = JSON.stringify(p.specs);
                modeloSelect.appendChild(opt);
            });
        });
        
        document.getElementById('modelo').addEventListener('change', function() {
            const specs = JSON.parse(this.options[this.selectedIndex].dataset.specs || '{}');
            const specsList = document.getElementById('specs-list');
            specsList.innerHTML = '';
            Object.entries(specs).forEach(([k, v]) => {
                specsList.innerHTML += `<div class="spec-item"><b>${k}:</b> ${v}</div>`;
            });
        });
        
        let isDragging = false, prevX = 0, prevY = 0;
        document.getElementById('canvas').addEventListener('mousedown', (e) => {
            isDragging = true;
            prevX = e.clientX;
            prevY = e.clientY;
        });
        document.getElementById('canvas').addEventListener('mousemove', (e) => {
            if (!isDragging || !mesh) return;
            mesh.rotation.y += (e.clientX - prevX) * 0.01;
            mesh.rotation.x += (e.clientY - prevY) * 0.01;
            prevX = e.clientX;
            prevY = e.clientY;
        });
        document.getElementById('canvas').addEventListener('mouseup', () => { isDragging = false; });
        document.getElementById('canvas').addEventListener('wheel', (e) => {
            e.preventDefault();
            camera.position.z += e.deltaY > 0 ? 10 : -10;
            camera.position.z = Math.max(30, Math.min(500, camera.position.z));
        });
        
        initThree();
    } catch(err) {
        console.error(err);
        document.body.innerHTML = '<p style="color:white;padding:20px;">Erro: ' + err.message + '</p>';
    }
    </script>
</body>
</html>
